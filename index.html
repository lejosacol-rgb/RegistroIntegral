<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora | Registro Integral de Salud</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon-512.png">

    <style>
        :root {
            --bg: #f5f5f5;
            --card: #ffffff;
            --primary: #1976d2;
            --text: #222;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --card: #1e1e1e;
                --text: #eee;
            }
        }
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* SPLASH */
        #splash {
            position: fixed;
            inset: 0;
            background: var(--primary);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOut .8s ease forwards;
            animation-delay: 1.4s;
        }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        header {
            padding: 16px;
            background: var(--primary);
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
        }
        header button {
            border: none;
            background: #ffffff22;
            color: #fff;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 18px;
            cursor: pointer;
        }

        main {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .card {
            background: var(--card);
            border-radius: 18px;
            padding: 18px;
            text-align: center;
            font-size: 18px;
            box-shadow: 0 6px 14px rgba(0,0,0,.15);
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.95); }
        .card.dragging { opacity: .5; }

        button {
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modalContent {
            background: var(--card);
            width: 92%;
            max-width: 520px;
            border-radius: 18px;
            padding: 16px;
            max-height: 90vh;
            overflow: auto;
        }

        .field { margin-bottom: 10px; }
        label { font-weight: bold; display: block; margin-bottom: 4px; }
        input, select {
            width: 100%;
            padding: 8px;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }
        img.preview {
            width: 100%;
            border-radius: 12px;
            margin-top: 6px;
        }

        /* ===== MODAL CONFIRMAR ===== */
        .confirm {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .confirmBox {
            background: var(--card);
            padding: 20px;
            border-radius: 18px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            animation: zoom .2s ease;
        }
        .confirmBox .row button { flex: 1; }
        .cancel { background: #aaa; }
        .delete { background: #d32f2f; }

        @keyframes zoom {
            from { transform: scale(.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body>

<div id="splash">
    <h1>🏥 Registro Integral</h1>
    <p>Nexora Health System</p>
</div>

<header>
    🏥 Registro Integral
    <button onclick="openConfig()">⚙️</button>
</header>

<main id="main"></main>

<div class="modal" id="config">
    <div class="modalContent">
        <h3>⚙️ Configuración</h3>
        <label>📤 WhatsApp</label>
        <input id="wsap" placeholder="Ej: 573001234567">
        <hr>
        <h4>➕ Crear ventana</h4>
        <input id="vName" placeholder="Nombre">
        <input id="vIcon" placeholder="Emoji">
        <button onclick="addWindow()">Agregar</button>
        <hr>
        <h4>✏️ Editar ventana</h4>
        <select id="editWin"></select>
        <input id="newWinName" placeholder="Nuevo nombre">
        <input id="newWinIcon" placeholder="Nuevo emoji">
        <button onclick="saveWindowEdit()">Guardar</button>
        <hr>
        <h4>🗑️ Eliminar ventana</h4>
        <select id="delWin"></select>
        <button onclick="deleteWindow()">Eliminar</button>
        <hr>
        <button onclick="closeConfig()">Cerrar</button>
    </div>
</div>

<div class="modal" id="formModal">
    <div class="modalContent">
        <h3 id="formTitle"></h3>
        <div id="formFields"></div>
        <div class="row">
            <button onclick="sendWhats()">📤 Enviar</button>
            <button onclick="clearForm()">🧹 Limpiar</button>
            <button onclick="closeForm()" style="background:#666">Cerrar</button>
        </div>
    </div>
</div>

<div class="confirm" id="confirmModal">
    <div class="confirmBox">
        <h3>🗑️ Eliminar ventana</h3>
        <p>¿Estás seguro de eliminar esta sección?</p>
        <div class="row">
            <button class="cancel" onclick="closeConfirm()">Cancelar</button>
            <button class="delete" onclick="confirmDelete()">Eliminar</button>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem("appData")) || {windows:[], wsap:""};
    let currentWin = null;
    let deleteIndex = null;

    const save = () => localStorage.setItem("appData", JSON.stringify(data));

    function render() {
        const main = document.getElementById("main");
        main.innerHTML = "";
        data.windows.forEach((w, i) => {
            let d = document.createElement("div");
            d.className = "card";
            d.innerHTML = `${w.icon}<br>${w.name}`;
            d.onclick = () => openForm(i);
            main.appendChild(d);
        });
    }

    function openConfig() {
        document.getElementById("wsap").value = data.wsap || "";
        const editWin = document.getElementById("editWin");
        const delWin = document.getElementById("delWin");
        
        const options = data.windows.map((w, i) => `<option value="${i}">${w.icon} ${w.name}</option>`).join("");
        editWin.innerHTML = delWin.innerHTML = options;
        
        document.getElementById("config").style.display = "flex";
    }

    function closeConfig() {
        data.wsap = document.getElementById("wsap").value;
        save();
        render();
        document.getElementById("config").style.display = "none";
    }

    function addWindow() {
        const name = document.getElementById("vName").value;
        const icon = document.getElementById("vIcon").value;
        if(!name) return;
        data.windows.push({name, icon, fields: [
            {name: "Paciente", icon: "👤", type: "text"},
            {name: "Observación", icon: "📝", type: "text"},
            {name: "Fecha", icon: "📅", type: "auto"}
        ]});
        document.getElementById("vName").value = "";
        document.getElementById("vIcon").value = "";
        save();
        openConfig();
    }

    function deleteWindow() {
        deleteIndex = document.getElementById("delWin").value;
        document.getElementById("confirmModal").style.display = "flex";
    }

    function confirmDelete() {
        data.windows.splice(deleteIndex, 1);
        save();
        closeConfirm();
        openConfig();
        render();
    }

    function closeConfirm() {
        document.getElementById("confirmModal").style.display = "none";
    }

    function openForm(i) {
        currentWin = i;
        let w = data.windows[i];
        document.getElementById("formTitle").innerText = w.icon + " " + w.name;
        const container = document.getElementById("formFields");
        container.innerHTML = "";

        w.fields.forEach((f, idx) => {
            let div = document.createElement("div");
            div.className = "field";
            div.innerHTML = `<label>${f.icon} ${f.name}</label>`;
            
            if(f.type === "auto") {
                div.innerHTML += `<input data-idx="${idx}" value="${new Date().toLocaleString()}" disabled>`;
            } else {
                div.innerHTML += `<input data-idx="${idx}" placeholder="Escribir aquí...">`;
            }
            container.appendChild(div);
        });
        document.getElementById("formModal").style.display = "flex";
    }

    function sendWhats() {
        let w = data.windows[currentWin];
        let msg = `*${w.icon} ${w.name}*\n\n`;
        document.querySelectorAll("#formFields input").forEach(input => {
            let field = w.fields[input.dataset.idx];
            msg += `*${field.name}:* ${input.value}\n`;
        });
        window.open(`https://wa.me/${data.wsap}?text=${encodeURIComponent(msg)}`);
    }

    function clearForm() {
        document.querySelectorAll("#formFields input").forEach(i => !i.disabled && (i.value = ""));
    }

    function closeForm() {
        document.getElementById("formModal").style.display = "none";
    }

    render();
</script>

</body>
</html>
